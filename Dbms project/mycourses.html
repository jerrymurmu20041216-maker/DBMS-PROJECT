<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses | Mini Classroom</title>

    <link rel="stylesheet" href="mangecourse.css">
</head>
<body>

    <header>
        <h1>📚 My Courses</h1>

        <div class="search-box">
            <input
                type="text"
                id="searchInput"
                placeholder="Search courses..."
            >
        </div>
    </header>


    <main class="course-container">

        <div class="course-card">
            <h2>Database Management System</h2>
            <p><strong>Code:</strong> CSE-2203</p>
            <p><strong>Teacher:</strong> Dr. Rahman</p>

            <button>Open Course</button>
        </div>


        <div class="course-card">
            <h2>Data Structures</h2>
            <p><strong>Code:</strong> CSE-1201</p>
            <p><strong>Teacher:</strong> Prof. Karim</p>

            <button>Open Course</button>
        </div>


        <div class="course-card">
            <h2>Physics</h2>
            <p><strong>Code:</strong> PHYS-1101</p>
            <p><strong>Teacher:</strong> Mr. D'Souza</p>

            <button>Open Course</button>
        </div>


        <div class="course-card">
            <h2>Web Engineering</h2>
            <p><strong>Code:</strong> CSE-3301</p>
            <p><strong>Teacher:</strong> Ms. Akter</p>

            <button>Open Course</button>
        </div>

    </main>


    <script src="mycourses.js"></script>

</body>
</html>
