<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Mini Classroom</title>

    <link rel="stylesheet" href="login.css">
</head>
<body>

    <div class="container">

        <div class="left-side">
            <h1>Mini Classroom</h1>
            <p>
                Learn, teach, and collaborate from anywhere.
            </p>
        </div>

        <div class="login-box">

            <h2>Login</h2>

            <form id="loginForm">

                <label>Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required
                >

                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required
                >

                <button type="submit" >
                  <a href="sdashbord.html"   href="tdashbord.html">Sign In</a>  
                </button>

            </form>

            <p class="register-text">
                Don't have an account?
                <a href="Registration.html">Register</a>
            </p>

        </div>

    </div>

    <script src="login.js"></script>

</body>
</html>
